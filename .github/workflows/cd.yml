name: SDSR-AI-PROD-CD

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/sdsr-ai:latest .

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/sdsr-ai:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            echo ">>> Creating Docker network if needed..."
            sudo docker network create sdsr-network || true

            echo ">>> Pulling latest AI Docker image..."
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/sdsr-ai:latest

            echo ">>> Stopping old AI container..."
            sudo docker stop sdsr-ai || true
            sudo docker rm sdsr-ai || true

            echo ">>> Running new AI container on port 8081..."
            sudo docker run -d \
              --name sdsr-ai \
              --network sdsr-network \
              --restart unless-stopped \
              -p 8081:8080 \
              --env-file /home/ubuntu/ai.env \
              ${{ secrets.DOCKER_USERNAME }}/sdsr-ai:latest

            echo ">>> AI health check..."
            sleep 5
            curl -f http://localhost:8081/ || (sudo docker logs --tail=100 sdsr-ai && exit 1)
